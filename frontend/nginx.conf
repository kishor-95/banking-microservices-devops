# nginx.conf  —  FIXED
#
# ROOT CAUSES THIS FILE HAD:
# ──────────────────────────────────────────────────────────────────────────────
# 1. No /api/ prefix on location blocks. Nginx was configured to route /auth/,
#    /accounts, /balance, /transactions — but the frontend was sending requests
#    to http://localhost:8001/auth/login (absolute URLs). Those requests never
#    reached Nginx at all. Nginx config was dead code.
#
# 2. Trailing-slash inconsistency:
#    location /auth/         ← with trailing slash
#    location /accounts      ← without trailing slash
#    location /balance       ← without trailing slash
#    location /transactions  ← without trailing slash
#    Nginx prefix matching behaves differently: `location /accounts` would match
#    /accountsXYZ (unintended). `location /accounts/` would not match /accounts
#    exactly. Fix: use trailing slash on ALL location blocks AND proxy_pass URIs.
#
# 3. proxy_pass had no trailing URI slash:
#    proxy_pass http://auth-service:8001;
#    With a trailing-slash location, nginx passes the full URI including the
#    location prefix. Result: /auth/login → http://auth-service:8001/auth/login
#    This WORKED by accident but only when requests actually reached Nginx.
#    With the /api/ fix, we must explicitly strip /api to keep FastAPI happy.
#
# THE FIX:
# ──────────────────────────────────────────────────────────────────────────────
# • All API locations prefixed with /api/
# • proxy_pass includes trailing URI → nginx strips the matched location prefix
#   Example: location /api/auth/ + proxy_pass http://auth-service:8001/auth/
#   means /api/auth/login → http://auth-service:8001/auth/login  ✓
# • All location blocks consistent: trailing slash on location AND proxy_pass
# • SPA fallback still catches all non-API, non-asset paths for React Router

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ────────────────────────────────────────────────────────────
    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;

    # ── Compression ────────────────────────────────────────────────────────────
    gzip          on;
    gzip_vary     on;
    gzip_types    text/plain text/css application/json application/javascript
                  text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # ── Upstream service definitions (Docker DNS resolves these names) ─────────
    # These names MUST match the service names in docker-compose.yml exactly.
    upstream auth_service        { server auth-service:8001; }
    upstream account_service     { server account-service:8002; }
    upstream balance_service     { server balance-service:8003; }
    upstream transaction_service { server transaction-service:8004; }

    server {
        listen      80;
        server_name _;
        root        /usr/share/nginx/html;
        index       index.html;

        # ── Security headers ──────────────────────────────────────────────────
        add_header X-Frame-Options        DENY              always;
        add_header X-Content-Type-Options nosniff           always;
        add_header X-XSS-Protection       "1; mode=block"  always;
        add_header Referrer-Policy        "no-referrer-when-downgrade" always;

        # ── Static assets (Vite output: hashed filenames → safe to cache) ─────
        location /assets/ {
            expires    1y;
            add_header Cache-Control "public, immutable";
        }

        # ── API proxy blocks ──────────────────────────────────────────────────
        # Pattern: location /api/<service>/ + proxy_pass upstream/<service>/
        # Nginx replaces the location prefix with the proxy_pass URI.
        # /api/auth/login  →  http://auth-service:8001/auth/login
        # /api/auth/verify →  http://auth-service:8001/auth/verify
        #
        # IMPORTANT: trailing slash on BOTH location and proxy_pass is required
        # for correct prefix stripping. Without it:
        #   location /api/auth  + proxy_pass http://upstream  →  path unchanged
        #   location /api/auth/ + proxy_pass http://upstream/ →  /api/auth/ stripped ✓

        location /api/auth/ {
            proxy_pass         http://auth_service/auth/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        location /api/accounts/ {
            proxy_pass         http://account_service/accounts/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # FIX: /api/accounts (no trailing slash) also needs to work for
        # POST /api/accounts (open account endpoint). Exact-match block:
        location = /api/accounts {
            proxy_pass         http://account_service/accounts;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /api/balance/ {
            proxy_pass         http://balance_service/balance/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        location = /api/balance {
            proxy_pass         http://balance_service/balance;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /api/transactions/ {
            proxy_pass         http://transaction_service/transactions/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;  # longer timeout for financial ops
        }

        # ── Health check endpoint (useful for K8s liveness probe on Nginx) ────
        location /health {
            access_log off;
            return 200 '{"status":"ok","service":"frontend"}';
            add_header Content-Type application/json;
        }

        # ── SPA fallback — React Router handles all non-API, non-asset paths ──
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
