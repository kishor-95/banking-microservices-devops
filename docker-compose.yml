version: "3.9"

# Shared env block injected into every backend service
x-backend-env: &backend-env
  DB_HOST:     ${DB_HOST}
  DB_PORT:     ${DB_PORT:-5432}
  DB_NAME:     ${DB_NAME}
  DB_USER:     ${DB_USER}
  DB_PASSWORD: ${DB_PASSWORD}
  JWT_SECRET:  ${JWT_SECRET}

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - bank-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    networks:
      - bank-network

  node-exporter:
    image: prom/node-exporter:v1.8.1
    restart: unless-stopped
    network_mode: host
    pid: host
    volumes:
      - /:/host:ro,rslave
    command:
      - '--path.rootfs=/host'
  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP:     "false"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - bank-network
    depends_on:
      - prometheus

  # ── auth-service ─────────────────────────────────────────────────────────────
  auth-service:
    build:
      context: .                          # root — gives access to common/
      dockerfile: auth-service/Dockerfile
    restart: unless-stopped
    environment: *backend-env
    expose: ["8001"]
    networks: [bank-network]
    depends_on:
      postgres: {condition: service_healthy}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/auth/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── account-service ──────────────────────────────────────────────────────────
  account-service:
    build:
      context: .
      dockerfile: account-service/Dockerfile
    restart: unless-stopped
    environment: *backend-env
    expose: ["8002"]
    networks: [bank-network]
    depends_on:
      postgres: {condition: service_healthy}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8002/accounts/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── balance-service ───────────────────────────────────────────────────────────
  balance-service:
    build:
      context: .
      dockerfile: balance-service/Dockerfile
    restart: unless-stopped
    environment: *backend-env
    expose: ["8003"]
    networks: [bank-network]
    depends_on:
      postgres: {condition: service_healthy}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8003/balance/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── transaction-service ───────────────────────────────────────────────────────
  transaction-service:
    build:
      context: .
      dockerfile: transaction-service/Dockerfile
    restart: unless-stopped
    environment: *backend-env
    expose: ["8004"]
    networks: [bank-network]
    depends_on:
      postgres: {condition: service_healthy}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8004/transactions/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── frontend ──────────────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    restart: unless-stopped
    ports: ["80:80"]
    networks: [bank-network]
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      auth-service:        {condition: service_healthy}
      account-service:     {condition: service_healthy}
      balance-service:     {condition: service_healthy}
      transaction-service: {condition: service_healthy}

volumes:
  pg_data:
  prometheus_data:
  grafana_data:

networks:
  bank-network:
    driver: bridge
