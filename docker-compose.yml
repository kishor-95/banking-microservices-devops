# docker-compose.yml
version: "3.9"

x-backend-env: &backend-env
  DB_HOST:     ${DB_HOST}
  DB_PORT:     ${DB_PORT}
  DB_NAME:     ${DB_NAME}
  DB_USER:     ${DB_USER}
  DB_PASSWORD: ${DB_PASSWORD}
  JWT_SECRET:  ${JWT_SECRET}

x-proxy-headers: &proxy-headers
  proxy_set_header: "Host $host"

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER} 
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    # Uncomment to connect with psql from host during debugging:
    # ports:
    #   - "5432:5432"
    networks:
      - bank-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bankapp"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── auth-service ─────────────────────────────────────────────────────────────
  auth-service:
    build: ./auth-service
    # image: kishor95/bankapp-auth-service:latest
    restart: unless-stopped
    environment:
      <<: *backend-env
    # Not exposed to host — reachable only via Nginx inside bank-network
    expose:
      - "8001"
    networks:
      - bank-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/auth/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── account-service ──────────────────────────────────────────────────────────
  account-service:
    build: ./account-service
    # image: kishor95/bankapp-account-service:latest
    restart: unless-stopped
    environment:
      <<: *backend-env
    expose:
      - "8002"
    networks:
      - bank-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/accounts/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── balance-service ───────────────────────────────────────────────────────────
  balance-service:
    build: ./balance-service
    # image: kishor95/bankapp-balance-service:latest
    restart: unless-stopped
    environment:
      <<: *backend-env
    expose:
      - "8003"
    networks:
      - bank-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8003/balance/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── transaction-service ───────────────────────────────────────────────────────
  transaction-service:
    build: ./transaction-service
    # image: kishor95/bankapp-transaction-service:latest
    restart: unless-stopped
    environment:
      <<: *backend-env
    expose:
      - "8004"
    networks:
      - bank-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8004/transactions/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── frontend (Nginx) ──────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    # image: kishor95/bankapp-frontend:latest  
    restart: unless-stopped
    ports:
      - "80:80"      # Only port exposed to the host
    networks:
      - bank-network
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      auth-service:
        condition: service_healthy
      account-service:
        condition: service_healthy
      balance-service:
        condition: service_healthy
      transaction-service:
        condition: service_healthy

volumes:
  pg_data:

networks:
  bank-network:
    name: bank-network
    driver: bridge

