# ── auth-service/deployment.yaml ─────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: transaction-service
  namespace: bankapp
  labels:
    app: transaction-service
    app.kubernetes.io/part-of: bankapp
spec:
  replicas: 2
  # ── Rolling update — zero downtime ───────────────────────────────────────────
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge:       1    # spin up 1 extra pod before terminating old ones
      maxUnavailable: 0    # never take a pod down before a new one is ready
  selector:
    matchLabels:
      app: transaction-service
  template:
    metadata:
      labels:
        app: transaction-service
    spec:
      # Graceful shutdown — let in-flight requests complete
      terminationGracePeriodSeconds: 30

      containers:
        - name: transaction-service
          image: kishor95/bankapp-transaction-service:latest         # ← fill in your image: e.g. your-registry/auth-service:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
          - containerPort: 8004

          # ── Non-sensitive config from ConfigMap ───────────────────────────
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: bankapp-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: bankapp-config
                  key: DB_PORT
            - name: JWT_EXPIRE_HOURS
              valueFrom:
                configMapKeyRef:
                  name: bankapp-config
                  key: JWT_EXPIRE_HOURS

            # ── Sensitive values from Secret ──────────────────────────────
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: bankapp-backend-secret
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: bankapp-backend-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bankapp-backend-secret
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: bankapp-backend-secret
                  key: JWT_SECRET

          # ── Liveness probe — restart container if app is frozen ───────────
          livenessProbe:
            httpGet:
              path: /transactions/health
              port: 8004
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5

          # ── Readiness probe — only send traffic when truly ready ──────────
          readinessProbe:
            httpGet:
              path: /transactions/health
              port: 8004
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 3

          resources:
            requests:
              cpu:    "150m"
              memory: "256Mi"
            limits:
              cpu:    "250m"
              memory: "256Mi"