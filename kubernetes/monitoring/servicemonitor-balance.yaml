# servicemonitor-balance.yaml

apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: bankapp-balance-service-monitor
  namespace: bankapp
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: balance-service
  namespaceSelector:
    matchNames:
      - bankapp
  endpoints:
    - port: balance-service-port
      path: /metrics
      interval: 30s
