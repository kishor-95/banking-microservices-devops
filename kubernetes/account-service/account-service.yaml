# ── auth-service/service.yaml ────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: account-service
  namespace: bankapp
  labels:
    app.kubernetes.io/part-of: bankapp
spec:
  selector:
    app: account-service
  ports:
  - name: account-service-port
    protocol: TCP
    ports: 8002
    targetPort: 8002
  type: ClusterIP
