apiVersion: v1
kind: Service
metadata:
  name: bankapp-frontend-service
  namespace: bankapp
  labels:
    app.kubernetes.io/part-of: bankapp
spec:
  selector:
    app: bankapp-frontend
  ports:
  - name: frontend-service-port
    protocol: TCP
    port: 80
    targetPort: 80
    # nodePort: 30080
  type: LoadBalancer
