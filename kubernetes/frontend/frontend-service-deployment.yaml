apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: bankapp-frontend
    app.kubernetes.io/part-of: bankapp
  name: bankapp-frontend-deployment
  namespace: bankapp
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: bankapp-frontend
  template:
    metadata:
      labels:
        app: bankapp-frontend
    spec:
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
      containers:
        - image: docker.io/kishor95/bankapp-frontend:17acf00-38
          imagePullPolicy: IfNotPresent
          name: bankapp-frontend
          ports:
            - containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          resources:
            limits:
              cpu: "100m"
              memory: "128Mi"
            requests:
              cpu: "50m"
              memory: "64Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
