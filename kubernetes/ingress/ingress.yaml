# ── ingress.yaml ─────────────────────────────────────────────────────────────
# Optional but recommended for production — routes external traffic to frontend.
# Requires an Ingress controller installed (nginx-ingress, traefik, etc.)
#
# Install nginx-ingress on your cluster:
#   kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.1/deploy/static/provider/cloud/deploy.yaml
#
# Replace host with your actual domain.

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bankapp-ingress
  namespace: bankapp
  labels:
    app.kubernetes.io/part-of: bankapp
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - host: bankapp.yourdomain.com     # ← replace with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80