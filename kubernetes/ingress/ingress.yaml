apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bankapp-frontend-ingress
  namespace: bankapp
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    #alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn:  arn:aws:acm:ap-south-1:151498474184:certificate/38fa3698-c5ea-4998-9f43-430a850e03dc
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/healthcheck-path: /health
spec:
  ingressClassName: alb        # ✅ correct way
  rules:
  - host: techpluse.online
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: bankapp-frontend-service
            port:
              number: 80
  - host: www.techpluse.online
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: bankapp-frontend-service
            port:
              number: 80