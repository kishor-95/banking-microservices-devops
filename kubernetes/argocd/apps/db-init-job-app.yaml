# argocd/apps/db-init-job-app.yaml
# DB init job runs before services start — wave 1 after configmaps.
# Jobs are one-shot; ArgoCD tracks completion but won't re-run them
# unless you delete the Job object manually.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bankapp-db-init
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/part-of: bankapp
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: bankapp

  source:
    repoURL: https://github.com/kishor-95/banking-microservices-devops.git
    targetRevision: main
    path: kubernetes/db-init-job

  destination:
    server: https://kubernetes.default.svc
    namespace: bankapp

  syncPolicy:
    automated:
      prune: true
      selfHeal: false             # Don't re-trigger a DB init job automatically
    syncOptions:
      - CreateNamespace=false
      - ApplyOutOfSyncOnly=true
