# argocd/apps/namespace-app.yaml
# Synced FIRST — all other apps depend on the bankapp namespace existing.
# Wave -1 ensures this runs before everything else.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bankapp-namespace
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/part-of: bankapp
  annotations:
    argocd.argoproj.io/sync-wave: "-1"    # ← sync first, before all other apps
spec:
  project: bankapp

  source:
    repoURL: https://github.com/kishor-95/banking-microservices-devops.git
    targetRevision: main
    path: kubernetes/namespace

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd             # Namespace resource itself is cluster-scoped

  syncPolicy:
    automated:
      prune: false                # Never auto-delete a namespace
      selfHeal: true
    syncOptions:
      - ApplyOutOfSyncOnly=true
