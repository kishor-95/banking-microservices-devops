global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: auth-service
    static_configs:
      - targets: ['auth-service:8001']
    metrics_path: /metrics

  - job_name: account-service
    static_configs:
      - targets: ['account-service:8002']
    metrics_path: /metrics

  - job_name: balance-service
    static_configs:
      - targets: ['balance-service:8003']
    metrics_path: /metrics

  - job_name: transaction-service
    static_configs:
      - targets: ['transaction-service:8004']
    metrics_path: /metrics

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['172.31.2.69:9100']            ## Change the IP Based on your VM private IP
