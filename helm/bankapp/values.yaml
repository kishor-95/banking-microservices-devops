namespace:
  create: true
  name: bankapp

configmaps:
  appConfig:
    DB_HOST: ""
    DB_PORT: "5432"
    JWT_EXPIRE_HOURS: "24"
  dbInit:
    enabled: true
    initSql: |
      -- ============================================================
      -- banking-app :: PostgreSQL Schema
      -- Designed for stateless microservices + Kubernetes deployment
      -- ============================================================

      BEGIN;

      -- ============================================================
      -- EXTENSIONS
      -- ============================================================
      -- pgcrypto → used for UUID generation (preferred over uuid-ossp)
      CREATE EXTENSION IF NOT EXISTS "pgcrypto";

      -- ============================================================
      -- USERS
      -- Owned by: auth-service, account-service
      -- ============================================================
      CREATE TABLE IF NOT EXISTS users (
          id              SERIAL PRIMARY KEY,
          username        VARCHAR(50)  UNIQUE NOT NULL,
          email           VARCHAR(150) UNIQUE NOT NULL,
          password_hash   VARCHAR(255) NOT NULL,
          full_name       VARCHAR(100),
          is_active       BOOLEAN DEFAULT TRUE,
          created_at      TIMESTAMPTZ DEFAULT NOW(),
          updated_at      TIMESTAMPTZ DEFAULT NOW()
      );

      -- ============================================================
      -- ACCOUNTS
      -- Owned by: account-service, balance-service
      -- ============================================================
      CREATE TABLE IF NOT EXISTS accounts (
          id              SERIAL PRIMARY KEY,
          user_id         INTEGER NOT NULL REFERENCES users(id) ON DELETE CASCADE,

          -- Use UUID instead of RANDOM() to guarantee uniqueness
          account_number  VARCHAR(50) UNIQUE NOT NULL DEFAULT gen_random_uuid()::TEXT,

          account_type    VARCHAR(20) NOT NULL DEFAULT 'checking'
                              CHECK (account_type IN ('checking', 'savings')),

          balance         NUMERIC(14, 2) NOT NULL DEFAULT 0.00
                              CHECK (balance >= 0),

          is_active       BOOLEAN DEFAULT TRUE,
          created_at      TIMESTAMPTZ DEFAULT NOW(),
          updated_at      TIMESTAMPTZ DEFAULT NOW()
      );

      -- ============================================================
      -- TRANSACTIONS (Append-only ledger — never update/delete)
      -- Owned by: transaction-service
      -- ============================================================
      CREATE TABLE IF NOT EXISTS transactions (
          id              SERIAL PRIMARY KEY,
          account_id      INTEGER NOT NULL REFERENCES accounts(id) ON DELETE RESTRICT,

          type            VARCHAR(10) NOT NULL
                              CHECK (type IN ('DEPOSIT', 'WITHDRAW')),

          amount          NUMERIC(14, 2) NOT NULL CHECK (amount > 0),
          balance_after   NUMERIC(14, 2) NOT NULL,

          description     TEXT,

          -- Idempotency key (must be UNIQUE)
          reference_id    UUID UNIQUE DEFAULT gen_random_uuid(),

          created_at      TIMESTAMPTZ DEFAULT NOW()
      );

      -- ============================================================
      -- INDEXES (Optimized for read-heavy workloads)
      -- ============================================================
      CREATE INDEX IF NOT EXISTS idx_accounts_user_id
          ON accounts(user_id);

      CREATE INDEX IF NOT EXISTS idx_transactions_account
          ON transactions(account_id);

      CREATE INDEX IF NOT EXISTS idx_transactions_created
          ON transactions(created_at DESC);

      CREATE INDEX IF NOT EXISTS idx_users_email
          ON users(email);

      -- ============================================================
      -- TRIGGER FUNCTION (Auto-update updated_at)
      -- ============================================================
      CREATE OR REPLACE FUNCTION set_updated_at()
      RETURNS TRIGGER AS $$
      BEGIN
          NEW.updated_at = NOW();
          RETURN NEW;
      END;
      $$ LANGUAGE plpgsql;

      -- ============================================================
      -- TRIGGERS (Idempotent creation)
      -- ============================================================

      -- Users trigger
      DO $$
      BEGIN
          IF NOT EXISTS (
              SELECT 1 FROM pg_trigger WHERE tgname = 'trg_users_updated_at'
          ) THEN
              CREATE TRIGGER trg_users_updated_at
              BEFORE UPDATE ON users
              FOR EACH ROW EXECUTE FUNCTION set_updated_at();
          END IF;
      END $$;

      -- Accounts trigger
      DO $$
      BEGIN
          IF NOT EXISTS (
              SELECT 1 FROM pg_trigger WHERE tgname = 'trg_accounts_updated_at'
          ) THEN
              CREATE TRIGGER trg_accounts_updated_at
              BEFORE UPDATE ON accounts
              FOR EACH ROW EXECUTE FUNCTION set_updated_at();
          END IF;
      END $$;

      -- ============================================================
      -- END OF SCHEMA
      -- ============================================================

      COMMIT;
  nginx:
    enabled: true
    nginxConf: |
      worker_processes auto;

      events {
          worker_connections 1024;
      }

      http {
          include      /etc/nginx/mime.types;
          default_type application/octet-stream;

          log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                          '$status $body_bytes_sent "$http_referer" '
                          '"$http_user_agent"';
          access_log /var/log/nginx/access.log main;
          error_log  /var/log/nginx/error.log warn;

          sendfile          on;
          tcp_nopush        on;
          keepalive_timeout 65;

          gzip          on;
          gzip_vary     on;
          gzip_types    text/plain text/css application/json application/javascript
                        text/xml application/xml application/xml+rss text/javascript;
          gzip_min_length 1000;

          # Service names must match Kubernetes Service names in this namespace
          upstream auth_service        { server bankapp-auth-service:8001; }
          upstream account_service     { server bankapp-account-service:8002; }
          upstream balance_service     { server bankapp-balance-service:8003; }
          upstream transaction_service { server bankapp-transaction-service:8004; }

          server {
              listen      80;
              server_name _;
              root        /usr/share/nginx/html;
              index       index.html;

              add_header X-Frame-Options        DENY             always;
              add_header X-Content-Type-Options nosniff          always;
              add_header X-XSS-Protection       "1; mode=block" always;
              add_header Referrer-Policy        "no-referrer-when-downgrade" always;

              location /assets/ {
                  expires    1y;
                  add_header Cache-Control "public, immutable";
              }

              location /api/auth/ {
                  proxy_pass         http://auth_service/auth/;
                  proxy_set_header   Host              $host;
                  proxy_set_header   X-Real-IP         $remote_addr;
                  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                  proxy_set_header   X-Forwarded-Proto $scheme;
                  proxy_read_timeout 30s;
              }

              location /api/accounts/ {
                  proxy_pass         http://account_service/accounts/;
                  proxy_set_header   Host              $host;
                  proxy_set_header   X-Real-IP         $remote_addr;
                  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                  proxy_set_header   X-Forwarded-Proto $scheme;
                  proxy_read_timeout 30s;
              }

              location = /api/accounts {
                  proxy_pass         http://account_service/accounts;
                  proxy_set_header   Host              $host;
                  proxy_set_header   X-Real-IP         $remote_addr;
                  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                  proxy_set_header   X-Forwarded-Proto $scheme;
              }

              location /api/balance/ {
                  proxy_pass         http://balance_service/balance/;
                  proxy_set_header   Host              $host;
                  proxy_set_header   X-Real-IP         $remote_addr;
                  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                  proxy_set_header   X-Forwarded-Proto $scheme;
                  proxy_read_timeout 30s;
              }

              location = /api/balance {
                  proxy_pass         http://balance_service/balance;
                  proxy_set_header   Host              $host;
                  proxy_set_header   X-Real-IP         $remote_addr;
                  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                  proxy_set_header   X-Forwarded-Proto $scheme;
              }

              location /api/transactions/ {
                  proxy_pass         http://transaction_service/transactions/;
                  proxy_set_header   Host              $host;
                  proxy_set_header   X-Real-IP         $remote_addr;
                  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                  proxy_set_header   X-Forwarded-Proto $scheme;
                  proxy_read_timeout 60s;
              }

              location /health {
                  access_log off;
                  return 200 '{"status":"ok","service":"frontend"}';
                  add_header Content-Type application/json;
              }

              location / {
                  try_files $uri $uri/ /index.html;
              }
          }
      }

secrets:
  dbName: "bankapp"
  dbUser: "dbadmin"
  dbPassword: ""
  jwtSecret: ""

services:
  auth:
    enabled: true
    name: auth-service
    replicaCount: 2
    image:
      repository: docker.io/kishor95/auth-service
      tag: latest
      pullPolicy: Always
    port: 8001
    healthPath: /auth/health
    resources:
      requests: { cpu: 100m, memory: 128Mi }
      limits:   { cpu: 250m, memory: 256Mi }
  account:
    enabled: true
    name: account-service
    replicaCount: 2
    image:
      repository: docker.io/kishor95/account-service
      tag: latest
      pullPolicy: Always
    port: 8002
    healthPath: /accounts/health
    resources:
      requests: { cpu: 100m, memory: 128Mi }
      limits:   { cpu: 250m, memory: 256Mi }
  balance:
    enabled: true
    name: balance-service
    replicaCount: 2
    image:
      repository: docker.io/kishor95/balance-service
      tag: latest
      pullPolicy: Always
    port: 8003
    healthPath: /balance/health
    resources:
      requests: { cpu: 100m, memory: 128Mi }
      limits:   { cpu: 250m, memory: 256Mi }
  transaction:
    enabled: true
    name: transaction-service
    replicaCount: 2
    image:
      repository: docker.io/kishor95/transaction-service
      tag: latest
      pullPolicy: Always
    port: 8004
    healthPath: /transactions/health
    resources:
      requests: { cpu: 150m, memory: 128Mi }
      limits:   { cpu: 250m, memory: 256Mi }
  frontend:
    enabled: true
    name: frontend
    replicaCount: 2
    image:
      repository: kishor95/bankapp-frontend
      tag: latest
      pullPolicy: IfNotPresent
    port: 80
    healthPath: /health
    resources:
      requests: { cpu: 50m, memory: 64Mi }
      limits:   { cpu: 100m, memory: 128Mi }

ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /health
  hosts:
    - paths:
        - path: /
          pathType: Prefix
          serviceName: frontend
          servicePort: 80

dbInitJob:
  enabled: true
  image: docker.io/library/postgres:17
  restartPolicy: Never
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400