{{- range $key, $svc := .Values.services }}
{{- if $svc.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bankapp-{{ $svc.name }}
  namespace: {{ $.Values.namespace.name }}
  labels:
    app: {{ $svc.name }}
    app.kubernetes.io/part-of: bankapp
    app.kubernetes.io/managed-by: {{ $.Release.Service }}
spec:
  replicas: {{ $svc.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: {{ $svc.name }}
  template:
    metadata:
      labels:
        app: {{ $svc.name }}
        app.kubernetes.io/part-of: bankapp
        app.kubernetes.io/managed-by: {{ $.Release.Service }}
    spec:
      terminationGracePeriodSeconds: 30
      {{- if eq $key "frontend" }}
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
      {{- end }}
      containers:
        - name: {{ $svc.name }}
          image: {{ $svc.image.repository }}:{{ $svc.image.tag }}
          imagePullPolicy: {{ $svc.image.pullPolicy }}
          ports:
            - containerPort: {{ $svc.port }}
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: bankapp-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: bankapp-config
                  key: DB_PORT
            - name: JWT_EXPIRE_HOURS
              valueFrom:
                configMapKeyRef:
                  name: bankapp-config
                  key: JWT_EXPIRE_HOURS
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: bankapp-backend-secret
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: bankapp-backend-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bankapp-backend-secret
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: bankapp-backend-secret
                  key: JWT_SECRET
          livenessProbe:
            httpGet:
              path: {{ $svc.healthPath }}
              port: {{ $svc.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: {{ $svc.healthPath }}
              port: {{ $svc.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: {{ $svc.resources.requests.cpu }}
              memory: {{ $svc.resources.requests.memory }}
            limits:
              cpu: {{ $svc.resources.limits.cpu }}
              memory: {{ $svc.resources.limits.memory }}
          {{- if eq $key "frontend" }}
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
          {{- end }}
---
{{- end }}
{{- end }}