{{- range $key, $svc := .Values.services }}
{{- if $svc.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: bankapp-{{ $svc.name }}
  namespace: {{ $.Values.namespace.name }}
  labels:
    app: {{ $svc.name }}
    app.kubernetes.io/part-of: bankapp
    app.kubernetes.io/managed-by: {{ $.Release.Service }}
spec:
  selector:
    app: {{ $svc.name }}
  ports:
    - name: {{ $svc.name }}-port
      protocol: TCP
      port: {{ $svc.port }}
      targetPort: {{ $svc.port }}
  type: ClusterIP
---
{{- end }}
{{- end }}